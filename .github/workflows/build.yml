name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: ''

      - name: Build
        run: chmod +x build.sh && ./build.sh

      - name: Upload AMR artifact
        uses: actions/upload-artifact@v4
        with:
          name: doge-reader-amr
          path: ${{ env.AMR_PATH }}
          if-no-files-found: error
          retention-days: 30